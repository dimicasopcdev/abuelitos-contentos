<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin · Abuelitos Contentos</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --sun:#F5A623;--coral:#F07A5A;--bark:#3D1C0B;--cream:#FFF8F0;
      --leaf:#4A7C59;--sky:#5B9EC9;--rose:#E8567A;
    }
    body{font-family:'Nunito',sans-serif;background:#f5f0eb;color:var(--bark);min-height:100vh;}

    /* LOGIN */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--cream);}
    .login-box{background:#fff;border-radius:20px;padding:2.5rem;border:2px solid rgba(245,166,35,0.25);width:100%;max-width:380px;text-align:center;box-shadow:0 8px 40px rgba(240,122,90,0.1);}
    .login-box h1{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:900;color:var(--coral);margin-bottom:0.5rem;}
    .login-box p{font-size:0.9rem;color:#9a6030;margin-bottom:1.5rem;font-weight:600;}
    .login-box input{width:100%;padding:0.85rem 1rem;border:1.5px solid #f5d8c0;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;outline:none;margin-bottom:1rem;color:var(--bark);}
    .login-box input:focus{border-color:var(--coral);}
    .btn{background:var(--coral);color:#fff;border:none;padding:0.85rem 2rem;border-radius:100px;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;cursor:pointer;width:100%;transition:background 0.2s;}
    .btn:hover{background:var(--rose);}
    .err{color:var(--rose);font-size:0.85rem;margin-top:0.5rem;font-weight:700;}

    /* DASHBOARD */
    #dashboard{display:none;}
    header{background:#fff;border-bottom:1.5px solid rgba(245,166,35,0.2);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
    .logo{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900;color:var(--coral);}
    .logout{font-size:0.8rem;font-weight:800;color:#9a6030;cursor:pointer;text-decoration:underline;}
    main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
    .stat{background:#fff;border-radius:16px;padding:1.25rem 1.5rem;border:1.5px solid rgba(245,166,35,0.15);}
    .stat-label{font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#9a6030;margin-bottom:0.4rem;}
    .stat-value{font-family:'Fraunces',serif;font-size:2.2rem;font-weight:900;color:var(--bark);line-height:1;}
    .stat-value.coral{color:var(--coral);}
    .stat-value.leaf{color:var(--leaf);}
    .stat-value.sky{color:var(--sky);}

    /* SECTION */
    .section{background:#fff;border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;border:1.5px solid rgba(245,166,35,0.12);}
    .section h2{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;margin-bottom:1.25rem;color:var(--bark);}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}

    /* LAUNCH BTN */
    .launch-area{display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;}
    .launch-area input{padding:0.6rem 1rem;border:1.5px solid #f5d8c0;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:600;font-size:0.85rem;outline:none;flex:1;min-width:220px;color:var(--bark);}
    .btn-small{background:var(--sun);color:#fff;border:none;padding:0.6rem 1.25rem;border-radius:100px;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
    .btn-small:hover{background:var(--coral);}
    .btn-small.danger{background:var(--rose);}
    .launch-result{font-size:0.85rem;font-weight:700;color:var(--leaf);margin-top:0.5rem;}

    /* TABLE */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:0.88rem;}
    thead th{text-align:left;padding:0.6rem 0.75rem;font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:#9a6030;border-bottom:1.5px solid #f5d8c0;}
    tbody tr{border-bottom:1px solid #faeedd;}
    tbody tr:last-child{border-bottom:none;}
    tbody td{padding:0.6rem 0.75rem;color:var(--bark);font-weight:600;vertical-align:middle;}
    .badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:0.72rem;font-weight:800;}
    .badge.sent{background:#e0f2e9;color:#2d6a44;}
    .badge.pending{background:#fff1e0;color:#8a5200;}
    .del-btn{background:none;border:none;color:#e0a080;cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:6px;transition:background 0.2s;}
    .del-btn:hover{background:#fee0d5;color:var(--rose);}

    /* SEARCH */
    .search-row{display:flex;gap:0.75rem;margin-bottom:1rem;}
    .search-row input{padding:0.6rem 1rem;border:1.5px solid #f5d8c0;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:600;font-size:0.85rem;outline:none;flex:1;color:var(--bark);}

    /* LOADING */
    .loading{text-align:center;color:#9a6030;font-weight:700;padding:2rem;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Admin Panel 🌻</h1>
    <p>Abuelitos Contentos · Acceso privado</p>
    <input type="password" id="token-input" placeholder="Token de administrador" autocomplete="current-password"/>
    <button class="btn" onclick="login()">Entrar</button>
    <p class="err" id="login-err"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div class="logo">Abuelitos Contentos 💛 Admin</div>
    <span class="logout" onclick="logout()">Cerrar sesión</span>
  </header>
  <main>

    <!-- STATS -->
    <div class="stats" id="stats-row">
      <div class="stat"><div class="stat-label">Total inscritos</div><div class="stat-value coral" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">Hoy</div><div class="stat-value" id="s-today">—</div></div>
      <div class="stat"><div class="stat-label">Email lanzamiento</div><div class="stat-value leaf" id="s-launched">—</div></div>
      <div class="stat"><div class="stat-label">Círculos de cuidado</div><div class="stat-value sky" id="s-circles">—</div></div>
      <div class="stat"><div class="stat-label">Miembros en círculos</div><div class="stat-value" id="s-members">—</div></div>
    </div>

    <!-- LAUNCH -->
    <div class="section">
      <h2>🚀 Email de lanzamiento</h2>
      <div class="launch-area">
        <input type="url" id="play-url" placeholder="URL de Google Play (https://play.google.com/...)"/>
        <button class="btn-small" onclick="sendLaunch()">Enviar a todos los pendientes 🎉</button>
      </div>
      <p class="launch-result" id="launch-result" style="display:none;"></p>
    </div>

    <!-- EMAIL LIST -->
    <div class="section">
      <div class="section-header">
        <h2>📋 Lista de espera</h2>
        <button class="btn-small" onclick="loadStats()">↺ Actualizar</button>
      </div>
      <div class="search-row">
        <input type="search" id="search" placeholder="Buscar por email o nombre..." oninput="filterTable()"/>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Email</th>
              <th>Nombre</th>
              <th>Fuente</th>
              <th>Fecha</th>
              <th>Lanzamiento</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="email-tbody">
            <tr><td colspan="7" class="loading">Cargando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
  let TOKEN = '';
  let allRows = [];

  function login() {
    TOKEN = document.getElementById('token-input').value.trim();
    if (!TOKEN) return;
    loadStats();
  }

  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function logout() {
    TOKEN = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('token-input').value = '';
  }

  async function loadStats() {
    try {
      const res = await fetch('/api/admin/stats', { headers: { 'x-admin-token': TOKEN } });
      if (res.status === 401) {
        document.getElementById('login-err').textContent = 'Token incorrecto';
        return;
      }
      const data = await res.json();
      document.getElementById('login-err').textContent = '';
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

      document.getElementById('s-total').textContent    = data.total.toLocaleString('es');
      document.getElementById('s-today').textContent    = data.today.toLocaleString('es');
      document.getElementById('s-launched').textContent = data.launched.toLocaleString('es');
      document.getElementById('s-circles').textContent  = data.circles.toLocaleString('es');
      document.getElementById('s-members').textContent  = data.members.toLocaleString('es');

      allRows = data.recent;
      renderTable(allRows);

    } catch(e) {
      document.getElementById('login-err').textContent = 'Error de conexión con el servidor';
    }
  }

  function renderTable(rows) {
    const tbody = document.getElementById('email-tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="loading">Sin inscritos aún 😊</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map((r, i) => `
      <tr id="row-${r.id}">
        <td style="color:#b08060;">${i+1}</td>
        <td>${r.email}</td>
        <td>${r.name || '—'}</td>
        <td>${r.source || 'landing'}</td>
        <td>${new Date(r.created_at).toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'})}</td>
        <td>
          ${r.launched
            ? '<span class="badge sent">✅ Enviado</span>'
            : '<span class="badge pending">Pendiente</span>'}
        </td>
        <td><button class="del-btn" onclick="deleteRow(${r.id})" title="Eliminar">🗑</button></td>
      </tr>
    `).join('');
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allRows.filter(r =>
      r.email.includes(q) || (r.name || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  async function deleteRow(id) {
    if (!confirm('¿Eliminar este registro?')) return;
    await fetch(`/api/admin/waitlist/${id}`, { method: 'DELETE', headers: { 'x-admin-token': TOKEN } });
    allRows = allRows.filter(r => r.id !== id);
    renderTable(allRows);
    loadStats();
  }

  async function sendLaunch() {
    const url = document.getElementById('play-url').value.trim();
    if (!url) { alert('Por favor ingresa la URL de Google Play'); return; }
    if (!confirm('¿Enviar email de lanzamiento a TODOS los pendientes? Esta acción no se puede deshacer.')) return;

    const res  = document.getElementById('launch-result');
    res.style.display = 'block';
    res.textContent = 'Enviando… esto puede tardar unos minutos ⏳';

    const r = await fetch('/api/admin/launch', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-admin-token': TOKEN },
      body: JSON.stringify({ playStoreUrl: url }),
    });
    const data = await r.json();
    res.textContent = `✅ Enviados: ${data.sent} · Errores: ${data.errors} de ${data.total} totales`;
    loadStats();
  }
</script>
</body>
</html>
